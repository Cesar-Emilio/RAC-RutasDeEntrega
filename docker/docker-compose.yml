version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: rac_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - rac_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rac_net

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: rac_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
      DB_HOST: db
    volumes:
      - rac_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    networks:
      - rac_net

  qcluster:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: rac_qcluster
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
      DB_HOST: db
    volumes:
      - rac_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py qcluster
    networks:
      - rac_net

  frontend:
    image: cesarzpll/rac-frontend:latest
    container_name: rac_frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - rac_net
 
  nginx:
    image: nginx:1.25-alpine
    container_name: rac_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - rac_static:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rac_net

volumes:
  rac_mysql_data:
  rac_logs:
  rac_static:

networks:
  rac_net:
    driver: bridge
